# /etc/nginx/sites-available/api.portfilo.online
# HTTP-only template. After you install this file and reload nginx, run
# `sudo certbot --nginx -d api.portfilo.online` — certbot edits this file to
# add the `listen 443 ssl` block and the redirect.

server {
    listen 80;
    listen [::]:80;
    server_name api.portfilo.online;

    # Let's Encrypt HTTP-01 challenge. Certbot writes files here.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Small health probe we can hit without TLS to verify the upstream is alive.
    location = /healthz {
        proxy_pass http://127.0.0.1:4100/api/health;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;

        # Client/origin info. X-Forwarded-For chains; Nest reads req.ip from it.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Upload ceiling — matches what the asset presign/upload flow expects.
        client_max_body_size 25m;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Hide upstream server banner; let nginx send its own.
        proxy_hide_header X-Powered-By;
    }
}
